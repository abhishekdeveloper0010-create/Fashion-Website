<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist | Fashion</title>

<link rel="stylesheet" href="../cart-pages.css/wishlist.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>
<body>

<section class="wishlist">

<div class="wishlist-header">

<h1><i class="fa-solid fa-heart"></i> My Wishlist</h1>

<p>Save your favorite products for later.</p>

<a href="../Homepage.html/shop-page.html" class="shop-btn">
Continue Shopping
</a>

</div>


<div class="wishlist-container">

<!-- Product 1 -->

<div class="wishlist-card">

<div class="wishlist-img">

<img src="../images/products/shoes.jpg" alt="">

</div>

<div class="wishlist-info">

<h2>White Sneakers</h2>

<p class="category">Men Shoes</p>

<div class="rating">
★★★★★
</div>

<div class="price">

<span class="new-price">₹2,499</span>

<span class="old-price">₹3,499</span>

</div>

<p class="stock">
<i class="fa-solid fa-circle-check"></i>
In Stock
</p>

<div class="buttons">

<button class="cart-btn">
<i class="fa-solid fa-cart-shopping"></i>
Add To Cart
</button>

<button class="remove-btn">
<i class="fa-solid fa-trash"></i>
Remove
</button>

</div>

</div>

</div>



<!-- Product 2 -->

<div class="wishlist-card">

<div class="wishlist-img">

<img src="../images/products/watch.jpg" alt="">

</div>

<div class="wishlist-info">

<h2>Luxury Watch</h2>

<p class="category">Accessories</p>

<div class="rating">
★★★★★
</div>

<div class="price">

<span class="new-price">₹1,999</span>

<span class="old-price">₹2,999</span>

</div>

<p class="stock">

<i class="fa-solid fa-circle-check"></i>

In Stock

</p>

<div class="buttons">

<button class="cart-btn">

<i class="fa-solid fa-cart-shopping"></i>

Add To Cart

</button>

<button class="remove-btn">

<i class="fa-solid fa-trash"></i>

Remove

</button>

</div>

</div>

</div>

</div>

</section>

</body>
</html>
